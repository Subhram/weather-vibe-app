<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center font-sans antialiased">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-slate-800 mb-6 text-center">Weather</h1>

        <div class="mb-6">
            <label for="city-select" class="block text-sm font-semibold text-slate-600 mb-2">Select a City</label>
            <select id="city-select" class="w-full bg-slate-50 border border-slate-200 text-slate-700 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors cursor-pointer">
                <option value="" disabled selected>Choose a location...</option>
                <option value="London">London</option>
                <option value="New York">New York</option>
                <option value="Tokyo">Tokyo</option>
            </select>
        </div>

        <div id="weather-card" class="hidden fade-in flex flex-col items-center bg-blue-50 rounded-xl p-6 border border-blue-100">
            <h2 id="city-name" class="text-2xl font-bold text-slate-800"></h2>
            <img id="weather-icon" src="" alt="Weather icon" class="w-24 h-24 my-2 drop-shadow-sm">
            <div class="text-5xl font-extrabold text-blue-600 mb-2">
                <span id="temperature"></span>°C
            </div>
            <p id="description" class="text-slate-600 text-lg capitalize font-medium"></p>
        </div>

        <div id="error-message" class="hidden mt-4 p-4 bg-red-50 text-red-600 rounded-lg text-sm text-center font-medium border border-red-100">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
